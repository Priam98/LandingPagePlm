<nav class="page-nav"><div class="page-nav-inner"><a class="page-brand" href="index.html"><img src="logo.svg" alt="Logo"><span>Plant P4</span></a><button id="themeBtn" type="button" aria-label="Ganti tema">🌙</button></div></nav>
<main class="page-shell game-layout">
<a href="index.html" class="back-btn">Kembali ke Portal</a>
<div class="game-card">
<h1>♟️ Berani ga?</h1>
<p>Karena produktivitas sudah maksimal, saatnya menambah fitur yang tidak diminta siapa-siapa.</p>
<button onclick="newGame()">Game Baru</button>
<div class="status" id="status">Putih jalan dulu.</div>
<div id="board" style="width:500px"></div>
<div class="quote" id="quote">"Kalah = CUPU"</div>
<hr>
<h3>Pemain</h3>
<input type="text" id="playerName" placeholder="Berani kasih nama?">
<button onclick="savePlayerName()">Simpan Nama</button>
<hr>
<h3>🏆 Hall of Fame</h3>
<div id="hallOfFame"></div>
<h3>💩 Hall of Shame</h3>
<div id="hallOfShame"></div>
<h3>🏃🏻 Melarikan Diri</h3>
<div id="kabur"></div>
</div>
</main>
