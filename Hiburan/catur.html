<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QC Chess Arena</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
    text-align:center;
}

.container{
    max-width:700px;
    margin:auto;
}

#board{
    width:100%;
    max-width:550px;
    margin:20px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:5px;
}

.status{
    margin-top:15px;
    font-weight:bold;
}

.quote{
    margin-top:15px;
    color:#666;
    font-style:italic;
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
}

</style>
</head>
<body>

<div class="container">

<a href="/index.html" class="back-btn">
⬅ Kembali ke Portal
</a>

<div class="card">

<h1>♟️ Berani ga?</h1>

<p>
Karena produktivitas sudah maksimal,
saatnya menambah fitur yang tidak diminta siapa-siapa.
</p>

<button onclick="newGame()">
Game Baru
</button>

<div class="status" id="status">
Putih jalan dulu.
</div>

<div id="board" style="width:500px"></div>

<div class="quote" id="quote">
"Kalah = CUPU"
</div>

<hr>
    <h3> Pemain</h3>
        <input
            type="text"
            id="playerName"
            placeholder="Berani kasih nama?"
            style="padding:10px; width:80%; border-radius:10px; border:1px solid #ccc;"
        >

    <button onclick="savePlayerName()">Simpan Nama</button>

<hr>
<h3>🏆Hall of Fame</h3>
<div id="hallOfFame"></div>

<h3>💩Hall of Shame</h3>
<div id="hallOfShame"></div>

<h3>🏃🏻Melarikan Diri</h3>
<div id="kabur"></div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script src="catur.js"></script>

</html>
